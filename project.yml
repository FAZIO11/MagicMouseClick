name: MagicMouseClick
options:
  bundleIdPrefix: com.fazil
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: MagicMouseClick
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MagicMouseClick:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
        buildPhase: sources
      - path: MultitouchSupport.h
        type: file
        buildPhase: sources
    resources:
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MagicMouseClick.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.fazil.MagicMouseClick
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/MultitouchSupport.h"
        OTHER_LDFLAGS:
          - "-framework"
          - "IOKit"
          - "-framework"
          - "CoreGraphics"
          - "-framework"
          - "ApplicationServices"
          - "-ld_classic"
